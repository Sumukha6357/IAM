version: '3.8'

services:
  iam-service:
    container_name: iam-auth-service
    build: .
    ports:
      - "${SERVER_PORT:-8081}:8081"
    environment:
      - SERVER_PORT=8081
      - DB_URL=jdbc:postgresql://postgres:5432/iam_lite
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-900000}
      - REFRESH_TOKEN_EXPIRATION=${REFRESH_TOKEN_EXPIRATION:-604800000}
    depends_on:
      - postgres
      - redis
    networks:
      - iam-network

  postgres:
    container_name: postgres
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=iam_lite
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-root}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - iam-network

  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - iam-network

networks:
  iam-network:
    driver: bridge

volumes:
  postgres-data:
